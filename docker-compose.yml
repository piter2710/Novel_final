services:
  db:
    image: postgres:15-alpine
    container_name: novel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: novel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override localhost from .env to use the 'db' container instead inside docker network
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/database
      - SYNC_DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/database
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel_worker
    restart: always
    command: celery -A celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/database
      - SYNC_DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/database
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - api

volumes:
  postgres_data:
  redis_data:
